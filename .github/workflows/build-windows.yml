name: Build Windows EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    name: Build LyricsWorksheet.exe
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest

      - name: Build Windows executable
        run: pyinstaller --noconfirm --clean LyricsWorksheet.spec

      - name: Verify executable
        shell: pwsh
        run: |
          if (!(Test-Path "dist/LyricsWorksheet.exe")) {
            throw "dist/LyricsWorksheet.exe was not created."
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: LyricsWorksheet-Windows
          path: dist/LyricsWorksheet.exe
          if-no-files-found: error
